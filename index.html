<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
    <button onclick="topFunction()" id="myBtn" title="Go to top">Top</button>
</head>
<script>
function startOrbiter() {
    document.body.classList.add('start');

    setTimeout(() => {
        document.getElementById('main-section')
            .scrollIntoView({ behavior: 'smooth' });
    }, 300);
}
</script>

<body class = "home">

<nav>
    <ul>
        <li class="brand">
            <a href="index.html">
                <img src="logo.png" class="logo">
                <span class="brand-text"></span>
            </a>
        </li>

                    <li><a href="index.html">Home</a></li>
            <li><a href="game.html">Game</a></li>
            <li><a href="details.html">Information</a></li>
            <li><a href="abs.html">About Us</a></li>
            <li><a href="cb.html" class="active">Chatbox</a></li>
    </ul>
</nav>

<!-- HERO SECTION -->
<section class="hero" id="hero">
    <img src="button.png" class="enter-img"
     onclick="startOrbiter()">
</section>

<!-- MAIN SECTION -->
<section class="section" id="main-section">
    <div class="spaceship">🚀</div>
    <h1>ORBITER</h1>
    <p class="changeable">Explore. Survive. Connect.</p>
    <p class="changeable">A space arcade experience built by Advit and Shaurya.</p>
    <p class="changeable">Dodge asteroids, collect coins, and travel deep into the cosmos.</p>
    <p class="changeable">Generated for 2026 DevPost hackathon.</p>
    
</section>

<button id="scrollTopBtn">↑</button>
<script>
const scrollBtn = document.getElementById("scrollTopBtn");

window.addEventListener("scroll", () => {
    if (window.scrollY > 300) {
        scrollBtn.classList.add("show");
    } else {
        scrollBtn.classList.remove("show");
    }
});

scrollBtn.addEventListener("click", () => {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
});
</script>

</body>
